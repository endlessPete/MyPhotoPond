<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Simple Pong</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #000;
    --fg: #fff;
    --accent: #4fc3f7;
    --danger: #ff4d4d;
    --panel: rgba(0, 0, 0, 0.82);
  }

  body {
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    touch-action: none;
    overflow: hidden;
    font-family: Arial, sans-serif;
    position: relative;
  }

  canvas {
    background: #000;
    max-width: 100%;
    height: auto;
    display: block;
  }

  /* Touch joystick */
  #joystickWrap {
    position: fixed;
    left: 24px;
    bottom: 24px;
    width: 130px;
    height: 130px;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 20;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  #joystickBase {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: rgba(255,255,255,0.10);
    border: 2px solid rgba(255,255,255,0.18);
    position: relative;
    backdrop-filter: blur(2px);
  }

  #joystickKnob {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(79,195,247,0.95);
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 18px rgba(79,195,247,0.35);
  }

  /* Modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }

  .panel {
    width: min(92vw, 420px);
    background: var(--panel);
    color: var(--fg);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 22px;
    text-align: center;
    box-shadow: 0 18px 50px rgba(0,0,0,0.45);
  }

  .panel h2 {
    font-size: 24px;
    margin-bottom: 10px;
  }

  .panel p {
    font-size: 15px;
    line-height: 1.45;
    opacity: 0.92;
    margin-bottom: 18px;
  }

  .btnRow {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .modalBtn {
    border: none;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    min-width: 140px;
  }

  .modalBtn.primary {
    background: var(--accent);
    color: #000;
  }

  .modalBtn.secondary {
    background: rgba(255,255,255,0.10);
    color: #fff;
  }

  .modalBtn:active {
    transform: scale(0.98);
  }

  .lockText {
    color: var(--danger);
    font-weight: bold;
  }

  @media (pointer: coarse) {
    #joystickWrap {
      display: flex;
    }
  }
</style>
</head>

<body>
<canvas id="pong" width="800" height="500"></canvas>

<div id="joystickWrap" aria-hidden="true">
  <div id="joystickBase">
    <div id="joystickKnob"></div>
  </div>
</div>

<div id="unlockOverlay" class="overlay">
  <div class="panel">
    <h2>you made it!</h2>
    <p>would you like to see this album? Or continue playing</p>
    <div class="btnRow">
      <button id="albumBtn" class="modalBtn primary">See album</button>
      <button id="continueBtn" class="modalBtn secondary">Continue playing</button>
    </div>
  </div>
</div>

<div id="lockOverlay" class="overlay">
  <div class="panel">
    <h2>run over</h2>
    <p class="lockText">the computer won this round.</p>
    <p>For this setup, the page is locked for this tab. Close this tab and reopen the game to try again.</p>
  </div>
</div>

<script>
const canvas = document.getElementById('pong');
const ctx = canvas.getContext('2d');

const joystickWrap = document.getElementById('joystickWrap');
const joystickBase = document.getElementById('joystickBase');
const joystickKnob = document.getElementById('joystickKnob');

const unlockOverlay = document.getElementById('unlockOverlay');
const lockOverlay = document.getElementById('lockOverlay');
const albumBtn = document.getElementById('albumBtn');
const continueBtn = document.getElementById('continueBtn');

/* ==========================
   CONFIG
========================== */

// Replace this with your real secret album URL
const SECRET_ALBUM_URL = "https://example.com/your-secret-album";

/*
  Hidden goal score.
  This is intentionally not written as a plain number.
  It is not truly secret because client-side code can always be inspected,
  but this keeps it from being obvious at a glance.
*/
function getGateScore() {
  return (["lily", "pad"].join("").length + "koi".length) - 1;
}

const paddleWidth = 10;
const paddleHeight = 100;
const ballRadius = 10;

/* ==========================
   STATE
========================== */
let playerScore = 0;
let computerScore = 0;
let gamePaused = false;
let runLocked = false;
let flashState = false;
let flashTimer = 0;
let usingTouchControls = window.matchMedia("(pointer: coarse)").matches;
let touchJoystickActive = false;
let joystickY = 0;

/* ==========================
   GAME OBJECTS
========================== */
const player = {
  x: canvas.width - paddleWidth - 15,
  y: canvas.height / 2 - paddleHeight / 2,
  width: paddleWidth,
  height: paddleHeight,
  dy: 7
};

const computer = {
  x: 15,
  y: canvas.height / 2 - paddleHeight / 2,
  width: paddleWidth,
  height: paddleHeight,
  speed: 4.35
};

const ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  radius: ballRadius,
  dx: 4.8,
  dy: 3.6
};

/* ==========================
   FAIL LOCK FOR TAB
========================== */
if (sessionStorage.getItem("pondRunLocked") === "1") {
  runLocked = true;
  lockOverlay.style.display = "flex";
}

/* ==========================
   DRAW FUNCTIONS
========================== */
function drawRect(x, y, w, h, color = "white") {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function drawCircle(x, y, r, color = "white") {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}

function drawNet() {
  for (let i = 0; i < canvas.height; i += 15) {
    drawRect(canvas.width / 2 - 1, i, 2, 10, "gray");
  }
}

function drawText(text, x, y, options = {}) {
  const {
    color = "white",
    size = 30,
    align = "left"
  } = options;

  ctx.fillStyle = color;
  ctx.font = `${size}px Arial`;
  ctx.textAlign = align;
  ctx.fillText(text, x, y);
  ctx.textAlign = "left";
}

/* ==========================
   INPUT: KEYBOARD
========================== */
document.addEventListener("keydown", e => {
  if (runLocked) return;

  // Hide joystick if keyboard is used
  usingTouchControls = false;
  joystickWrap.style.display = "none";

  if (e.key === "ArrowUp") {
    player.y -= player.dy * 2;
  }
  if (e.key === "ArrowDown") {
    player.y += player.dy * 2;
  }
});

/* ==========================
   INPUT: MOUSE
========================== */
canvas.addEventListener("mousemove", e => {
  if (runLocked) return;

  usingTouchControls = false;
  joystickWrap.style.display = "none";

  const rect = canvas.getBoundingClientRect();
  const scaleY = canvas.height / rect.height;
  player.y = (e.clientY - rect.top) * scaleY - player.height / 2;
});

/* ==========================
   INPUT: TOUCH JOYSTICK
========================== */
function resetJoystickVisual() {
  joystickKnob.style.left = "50%";
  joystickKnob.style.top = "50%";
}

function handleJoystickTouch(clientX, clientY) {
  const rect = joystickBase.getBoundingClientRect();
  const centerX = rect.left + rect.width / 2;
  const centerY = rect.top + rect.height / 2;

  let dx = clientX - centerX;
  let dy = clientY - centerY;

  const maxDist = rect.width * 0.33;
  const dist = Math.hypot(dx, dy);

  if (dist > maxDist) {
    const angle = Math.atan2(dy, dx);
    dx = Math.cos(angle) * maxDist;
    dy = Math.sin(angle) * maxDist;
  }

  joystickKnob.style.left = `${50 + (dx / (rect.width / 2)) * 50}%`;
  joystickKnob.style.top = `${50 + (dy / (rect.height / 2)) * 50}%`;

  joystickY = dy / maxDist;
}

joystickBase.addEventListener("touchstart", e => {
  if (runLocked) return;
  usingTouchControls = true;
  touchJoystickActive = true;
  handleJoystickTouch(e.touches[0].clientX, e.touches[0].clientY);
  e.preventDefault();
}, { passive: false });

joystickBase.addEventListener("touchmove", e => {
  if (runLocked) return;
  usingTouchControls = true;
  touchJoystickActive = true;
  handleJoystickTouch(e.touches[0].clientX, e.touches[0].clientY);
  e.preventDefault();
}, { passive: false });

joystickBase.addEventListener("touchend", e => {
  touchJoystickActive = false;
  joystickY = 0;
  resetJoystickVisual();
  e.preventDefault();
}, { passive: false });

/* ==========================
   COLLISION
========================== */
function collision(b, p) {
  return (
    b.x - b.radius < p.x + p.width &&
    b.x + b.radius > p.x &&
    b.y - b.radius < p.y + p.height &&
    b.y + b.radius > p.y
  );
}

/* ==========================
   BALL RESET
========================== */
function resetBall(scoredOnPlayer = false) {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;

  // keep pace reasonable
  const baseX = 4.8;
  const baseY = 3.4 + Math.random() * 1.6;

  ball.dx = scoredOnPlayer ? -baseX : baseX;
  ball.dy = Math.random() > 0.5 ? baseY : -baseY;
}

/* ==========================
   GAME EVENTS
========================== */
function showUnlockPrompt() {
  gamePaused = true;
  unlockOverlay.style.display = "flex";
}

function hardLockRun() {
  runLocked = true;
  gamePaused = true;
  sessionStorage.setItem("pondRunLocked", "1");
  lockOverlay.style.display = "flex";
}

function afterWinReset() {
  playerScore = 0;
  computerScore = 0;
  resetBall(false);
  gamePaused = false;
}

albumBtn.addEventListener("click", () => {
  // Reset the challenge so the player must win again next time
  afterWinReset();
  unlockOverlay.style.display = "none";
  window.open(SECRET_ALBUM_URL, "_blank", "noopener");
});

continueBtn.addEventListener("click", () => {
  afterWinReset();
  unlockOverlay.style.display = "none";
});

/* ==========================
   UPDATE
========================== */
function update() {
  if (gamePaused || runLocked) return;

  // Touch joystick movement
  if (usingTouchControls && touchJoystickActive) {
    player.y += joystickY * 7;
  }

  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall collision
  if (ball.y - ball.radius < 0) {
    ball.y = ball.radius;
    ball.dy *= -1;
  }
  if (ball.y + ball.radius > canvas.height) {
    ball.y = canvas.height - ball.radius;
    ball.dy *= -1;
  }

  // AI: beatable but not sleepy
  const computerCenter = computer.y + computer.height / 2;
  const trackingTarget = ball.y + (ball.dy * 2.5);

  if (computerCenter < trackingTarget - 10) {
    computer.y += computer.speed;
  } else if (computerCenter > trackingTarget + 10) {
    computer.y -= computer.speed;
  }

  // Clamp paddles
  player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
  computer.y = Math.max(0, Math.min(canvas.height - computer.height, computer.y));

  // Paddle collision
  const paddle = ball.x < canvas.width / 2 ? computer : player;
  if (collision(ball, paddle)) {
    let collidePoint = ball.y - (paddle.y + paddle.height / 2);
    collidePoint = collidePoint / (paddle.height / 2);

    const angle = collidePoint * (Math.PI / 4);
    const direction = ball.x < canvas.width / 2 ? 1 : -1;

    const speed = Math.min(Math.hypot(ball.dx, ball.dy) + 0.22, 8.2);
    ball.dx = direction * speed * Math.cos(angle);
    ball.dy = speed * Math.sin(angle);

    // prevent sticky collision
    if (direction === 1) {
      ball.x = computer.x + computer.width + ball.radius;
    } else {
      ball.x = player.x - ball.radius;
    }
  }

  // Scoring
  if (ball.x - ball.radius < 0) {
    playerScore++;
    resetBall(false);
  }

  if (ball.x + ball.radius > canvas.width) {
    computerScore++;
    resetBall(true);
  }

  // Hidden win condition
  const gateScore = getGateScore();

  if (playerScore >= gateScore) {
    showUnlockPrompt();
  }

  if (computerScore >= gateScore) {
    hardLockRun();
  }

  // Flash clue when one away
  if (playerScore === gateScore - 1) {
    flashTimer++;
    if (flashTimer % 20 === 0) {
      flashState = !flashState;
    }
  } else {
    flashState = false;
    flashTimer = 0;
  }
}

/* ==========================
   RENDER
========================== */
function render() {
  drawRect(0, 0, canvas.width, canvas.height, "black");
  drawNet();

  const gateScore = getGateScore();
  const playerFlash = playerScore === gateScore - 1 && flashState;

  drawText(computerScore, canvas.width / 2 - 60, 40, {
    color: "white",
    size: 30,
    align: "left"
  });

  drawText(playerScore, canvas.width / 2 + 40, 40, {
    color: playerFlash ? "#4fc3f7" : "white",
    size: playerFlash ? 34 : 30,
    align: "left"
  });

  drawRect(player.x, player.y, player.width, player.height);
  drawRect(computer.x, computer.y, computer.width, computer.height);
  drawCircle(ball.x, ball.y, ball.radius);

  // Tiny mysterious clue when close
  if (playerScore === gateScore - 1 && flashState) {
    drawText("...", canvas.width / 2, 80, {
      color: "#4fc3f7",
      size: 18,
      align: "center"
    });
  }

  if (gamePaused && !runLocked) {
    drawText("paused", canvas.width / 2, canvas.height - 24, {
      color: "rgba(255,255,255,0.45)",
      size: 16,
      align: "center"
    });
  }
}

/* ==========================
   LOOP
========================== */
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
